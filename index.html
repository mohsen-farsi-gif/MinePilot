<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MinePilot</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<div class="header">

<h1>🚀 MinePilot</h1>

<div id="status" class="online">
🟢 Connected
</div>

<div id="clock"></div>

</div>

<div id="cards">

<div class="card">

<div class="label">
Bitcoin
</div>

<div id="btcPrice" class="value">
118000 $
</div>

<div id="btcChange" class="change positive">
+0.00%
</div>

</div>

<div class="card">

<div class="label">
Hashprice
</div>

<div id="hashPrice" class="value">
58.60 $
</div>

<div id="hashChange" class="change positive">
+0.00%
</div>

</div>

<div class="card">

<div class="label">
Network Hashrate
</div>

<div class="value">
930 EH/s
</div>

</div>

<div class="card">

<div class="label">
Difficulty
</div>

<div class="value">
128 T
</div>

</div>

</div>

<button onclick="refreshData()">
Refresh
</button>

<button onclick="changeTheme()">
Theme
</button>

</div>

<script src="script.js"></script>

</body>
</html>
